<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00A4EF"/>
      <stop offset="100%" style="stop-color:#0078D4"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="220" ry="220" fill="url(#bg)"/>

  <!-- Large white heart -->
  <g transform="translate(512, 520) scale(4.8)" filter="drop-shadow(0 2px 8px rgba(0,0,0,0.15))">
    <path d="M0,-48 C0,-48, 0,-72, -24,-84 C-48,-96, -72,-72, -72,-48 C-72,-12, -36,24, 0,60 C36,24, 72,-12, 72,-48 C72,-72, 48,-96, 24,-84 C0,-72, 0,-48, 0,-48Z" fill="white"/>
  </g>

  <!-- Hands group: based on reference image, scaled to fit inside heart -->
  <!-- Reference: ~400x400 original, we place at center, scale to ~240px wide -->
  <!-- Left hand (orange): palm open, fingers up, curving from bottom-left to upper-center -->
  <g transform="translate(512, 560) scale(0.6)">
    <!-- Left hand - orange -->
    <g fill="none" stroke="#F0A030" stroke-width="18" stroke-linecap="round" stroke-linejoin="round">
      <!-- Outer contour: bottom wrist up through palm, around fingers, back down inner side -->
      <path d="
        M -160,180
        C -160,120, -165,60, -155,0
        C -145,-50, -130,-80, -115,-100
        C -105,-115, -95,-125, -85,-115
        C -80,-108, -82,-95, -85,-80
        "/>
      <!-- Four fingers going up -->
      <path d="
        M -115,-100
        L -110,-140
        C -108,-160, -100,-180, -90,-190
        C -80,-195, -72,-190, -72,-175
        L -75,-145
        "/>
      <path d="
        M -75,-145
        L -68,-185
        C -65,-210, -55,-230, -45,-235
        C -35,-237, -28,-230, -28,-215
        L -35,-175
        "/>
      <path d="
        M -35,-175
        L -28,-210
        C -25,-235, -15,-250, -5,-252
        C 5,-252, 10,-242, 10,-225
        L 2,-185
        "/>
      <path d="
        M 2,-185
        L 8,-215
        C 10,-232, 18,-245, 28,-245
        C 38,-242, 40,-230, 38,-215
        L 30,-180
        "/>
      <!-- Thumb -->
      <path d="
        M -85,-80
        C -70,-60, -50,-50, -30,-48
        "/>
      <!-- Inner palm line back down -->
      <path d="
        M -30,-48
        C -20,-20, -15,40, -15,100
        L -15,180
        "/>
    </g>

    <!-- Right hand - blue (mirrored) -->
    <g fill="none" stroke="#5B8EC9" stroke-width="18" stroke-linecap="round" stroke-linejoin="round">
      <path d="
        M 160,180
        C 160,120, 165,60, 155,0
        C 145,-50, 130,-80, 115,-100
        C 105,-115, 95,-125, 85,-115
        C 80,-108, 82,-95, 85,-80
        "/>
      <path d="
        M 115,-100
        L 110,-140
        C 108,-160, 100,-180, 90,-190
        C 80,-195, 72,-190, 72,-175
        L 75,-145
        "/>
      <path d="
        M 75,-145
        L 68,-185
        C 65,-210, 55,-230, 45,-235
        C 35,-237, 28,-230, 28,-215
        L 35,-175
        "/>
      <path d="
        M 35,-175
        L 28,-210
        C 25,-235, 15,-250, 5,-252
        C -5,-252, -10,-242, -10,-225
        L -2,-185
        "/>
      <path d="
        M -2,-185
        L -8,-215
        C -10,-232, -18,-245, -28,-245
        C -38,-242, -40,-230, -38,-215
        L -30,-180
        "/>
      <!-- Thumb -->
      <path d="
        M 85,-80
        C 70,-60, 50,-50, 30,-48
        "/>
      <!-- Inner palm -->
      <path d="
        M 30,-48
        C 20,-20, 15,40, 15,100
        L 15,180
        "/>
    </g>
  </g>

  <!-- Sprout between hands -->
  <!-- Short stem -->
  <line x1="512" y1="530" x2="512" y2="495" stroke="#4CAF50" stroke-width="7" stroke-linecap="round"/>

  <!-- Left leaf -->
  <path d="
    M 512,510
    C 498,486, 465,472, 450,488
    C 435,504, 465,525, 512,510 Z"
    fill="#66BB6A"/>

  <!-- Right leaf -->
  <path d="
    M 512,510
    C 526,486, 559,472, 574,488
    C 589,504, 559,525, 512,510 Z"
    fill="#66BB6A"/>
</svg>
