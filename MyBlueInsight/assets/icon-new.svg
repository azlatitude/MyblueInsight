<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <!-- Rich blue gradient background -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E3A8A"/>
      <stop offset="35%" style="stop-color:#2563EB"/>
      <stop offset="65%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#1E40AF"/>
    </linearGradient>
    <!-- Ambient glow -->
    <radialGradient id="glow" cx="35%" cy="30%" r="65%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.18)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </radialGradient>
    <!-- Inner shadow for depth -->
    <radialGradient id="innerShadow" cx="50%" cy="100%" r="60%">
      <stop offset="0%" style="stop-color:rgba(0,0,0,0.25)"/>
      <stop offset="100%" style="stop-color:rgba(0,0,0,0)"/>
    </radialGradient>
    <!-- Heart gradient - pearlescent white/blue -->
    <linearGradient id="heartGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="40%" style="stop-color:#f0f4ff"/>
      <stop offset="100%" style="stop-color:#dbeafe"/>
    </linearGradient>
    <!-- Heart glow -->
    <radialGradient id="heartGlow" cx="40%" cy="35%" r="50%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,1)"/>
      <stop offset="100%" style="stop-color:rgba(219,234,254,0.8)"/>
    </radialGradient>
    <!-- Gold shimmer for diamond accents -->
    <linearGradient id="goldShimmer" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F59E0B"/>
      <stop offset="50%" style="stop-color:#FBBF24"/>
      <stop offset="100%" style="stop-color:#F59E0B"/>
    </linearGradient>
    <!-- Subtle sparkle -->
    <radialGradient id="sparkle" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#fff"/>
      <stop offset="50%" style="stop-color:rgba(255,255,255,0.6)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="25" flood-color="rgba(0,0,0,0.35)"/>
    </filter>
    <filter id="innerGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background with rounded corners -->
  <rect width="1024" height="1024" rx="220" ry="220" fill="url(#bg)"/>
  <rect width="1024" height="1024" rx="220" ry="220" fill="url(#glow)"/>
  <rect width="1024" height="1024" rx="220" ry="220" fill="url(#innerShadow)"/>

  <!-- Subtle decorative rings -->
  <circle cx="512" cy="480" r="320" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="2"/>
  <circle cx="512" cy="480" r="280" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1.5"/>

  <!-- Main heart with shadow -->
  <g filter="url(#softShadow)">
    <g transform="translate(512, 440) scale(1.25)">
      <path d="M0,120
        C0,75 -35,45 -75,-10
        C-150,-95 -230,-75 -230,-10
        C-230,55 -150,135 0,250
        C150,135 230,55 230,-10
        C230,-75 150,-95 75,-10
        C35,45 0,75 0,120Z"
        fill="url(#heartGrad)"/>
      <path d="M0,120
        C0,75 -35,45 -75,-10
        C-150,-95 -230,-75 -230,-10
        C-230,55 -150,135 0,250
        C150,135 230,55 230,-10
        C230,-75 150,-95 75,-10
        C35,45 0,75 0,120Z"
        fill="url(#heartGlow)" opacity="0.5"/>
    </g>
  </g>

  <!-- Heart shine highlight -->
  <g transform="translate(512, 440) scale(1.25)">
    <ellipse cx="-70" cy="-30" rx="55" ry="30" fill="rgba(255,255,255,0.5)" transform="rotate(-25,-70,-30)"/>
  </g>

  <!-- Eyes - deeper blue, friendly -->
  <g transform="translate(512, 440) scale(1.25)">
    <circle cx="-55" cy="-30" r="16" fill="#1E3A8A"/>
    <circle cx="-55" cy="-34" r="5" fill="rgba(255,255,255,0.7)"/>
    <circle cx="55" cy="-30" r="16" fill="#1E3A8A"/>
    <circle cx="55" cy="-34" r="5" fill="rgba(255,255,255,0.7)"/>
  </g>

  <!-- Smile - thicker, warmer -->
  <g transform="translate(512, 440) scale(1.25)">
    <path d="M-45,25 Q0,75 45,25" stroke="#1E3A8A" stroke-width="9" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Small gold diamond accents floating around -->
  <!-- Top right -->
  <g transform="translate(720, 220) rotate(45)">
    <rect x="-14" y="-14" width="28" height="28" rx="4" fill="url(#goldShimmer)" opacity="0.85"/>
  </g>
  <!-- Top left -->
  <g transform="translate(310, 260) rotate(45)">
    <rect x="-10" y="-10" width="20" height="20" rx="3" fill="url(#goldShimmer)" opacity="0.65"/>
  </g>
  <!-- Bottom right -->
  <g transform="translate(740, 600) rotate(45)">
    <rect x="-8" y="-8" width="16" height="16" rx="2" fill="url(#goldShimmer)" opacity="0.55"/>
  </g>

  <!-- Sparkle dots -->
  <circle cx="680" cy="300" r="4" fill="white" opacity="0.7"/>
  <circle cx="350" cy="350" r="3" fill="white" opacity="0.5"/>
  <circle cx="760" cy="500" r="3" fill="white" opacity="0.4"/>
  <circle cx="280" cy="580" r="2.5" fill="white" opacity="0.35"/>

  <!-- Bottom accent line -->
  <rect x="432" y="840" width="160" height="3" rx="1.5" fill="rgba(255,255,255,0.25)"/>
</svg>
