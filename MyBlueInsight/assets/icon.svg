<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <!-- Blue gradient - same tones as original, more depth -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5BA0E0"/>
      <stop offset="40%" style="stop-color:#4A90D9"/>
      <stop offset="70%" style="stop-color:#357ABD"/>
      <stop offset="100%" style="stop-color:#1a5276"/>
    </linearGradient>
    <radialGradient id="glow" cx="30%" cy="25%" r="65%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.2)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </radialGradient>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%" style="stop-color:rgba(0,0,0,0)"/>
      <stop offset="100%" style="stop-color:rgba(0,0,0,0.15)"/>
    </radialGradient>
    <filter id="heartShadow" x="-15%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="rgba(0,0,0,0.3)"/>
    </filter>
    <!-- Concentric heart gradients -->
    <linearGradient id="redHeart" x1="30%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B6B"/>
      <stop offset="50%" style="stop-color:#F25C54"/>
      <stop offset="100%" style="stop-color:#D94040"/>
    </linearGradient>
    <linearGradient id="greenHeart" x1="30%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%" style="stop-color:#6DD47E"/>
      <stop offset="50%" style="stop-color:#4DC264"/>
      <stop offset="100%" style="stop-color:#34A853"/>
    </linearGradient>
    <linearGradient id="yellowHeart" x1="30%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD966"/>
      <stop offset="50%" style="stop-color:#FBBC04"/>
      <stop offset="100%" style="stop-color:#E8A800"/>
    </linearGradient>
    <linearGradient id="blueHeart" x1="30%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%" style="stop-color:#6CB4EE"/>
      <stop offset="50%" style="stop-color:#4285F4"/>
      <stop offset="100%" style="stop-color:#2B6CC4"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="220" ry="220" fill="url(#bg)"/>
  <rect width="1024" height="1024" rx="220" ry="220" fill="url(#glow)"/>
  <rect width="1024" height="1024" rx="220" ry="220" fill="url(#vignette)"/>

  <!-- Subtle depth rings -->
  <circle cx="512" cy="490" r="350" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1.5"/>
  <circle cx="512" cy="490" r="300" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

  <!-- Outer Red Heart -->
  <g filter="url(#heartShadow)">
    <g transform="translate(512, 440) scale(1.35)">
      <path d="M0,120 C0,75 -35,45 -75,-10 C-150,-95 -230,-75 -230,-10 C-230,55 -150,135 0,250 C150,135 230,55 230,-10 C230,-75 150,-95 75,-10 C35,45 0,75 0,120Z"
        fill="url(#redHeart)"/>
      <ellipse cx="-80" cy="-30" rx="45" ry="22" fill="rgba(255,255,255,0.25)" transform="rotate(-20,-80,-30)"/>
    </g>
  </g>

  <!-- Green Heart -->
  <g transform="translate(512, 455) scale(1.0)">
    <path d="M0,120 C0,75 -35,45 -75,-10 C-150,-95 -230,-75 -230,-10 C-230,55 -150,135 0,250 C150,135 230,55 230,-10 C230,-75 150,-95 75,-10 C35,45 0,75 0,120Z"
      fill="url(#greenHeart)"/>
    <ellipse cx="-75" cy="-25" rx="40" ry="18" fill="rgba(255,255,255,0.2)" transform="rotate(-20,-75,-25)"/>
  </g>

  <!-- Yellow Heart -->
  <g transform="translate(512, 468) scale(0.72)">
    <path d="M0,120 C0,75 -35,45 -75,-10 C-150,-95 -230,-75 -230,-10 C-230,55 -150,135 0,250 C150,135 230,55 230,-10 C230,-75 150,-95 75,-10 C35,45 0,75 0,120Z"
      fill="url(#yellowHeart)"/>
    <ellipse cx="-70" cy="-20" rx="35" ry="15" fill="rgba(255,255,255,0.2)" transform="rotate(-20,-70,-20)"/>
  </g>

  <!-- Inner Blue Heart -->
  <g transform="translate(512, 478) scale(0.48)">
    <path d="M0,120 C0,75 -35,45 -75,-10 C-150,-95 -230,-75 -230,-10 C-230,55 -150,135 0,250 C150,135 230,55 230,-10 C230,-75 150,-95 75,-10 C35,45 0,75 0,120Z"
      fill="url(#blueHeart)"/>
    <ellipse cx="-65" cy="-18" rx="30" ry="12" fill="rgba(255,255,255,0.3)" transform="rotate(-20,-65,-18)"/>
  </g>

  <!-- Sparkle accents -->
  <circle cx="700" cy="260" r="4" fill="rgba(255,255,255,0.6)"/>
  <circle cx="340" cy="310" r="3" fill="rgba(255,255,255,0.4)"/>
  <circle cx="730" cy="550" r="2.5" fill="rgba(255,255,255,0.35)"/>
</svg>
