<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00A4EF"/>
      <stop offset="100%" style="stop-color:#0078D4"/>
    </linearGradient>
  </defs>

  <!-- Background: Microsoft Blue -->
  <rect width="1024" height="1024" rx="220" ry="220" fill="url(#bg)"/>

  <!-- 3 concentric hearts, same center (512, 490), proportional scaling -->

  <!-- Heart 1: largest, Microsoft Red -->
  <g transform="translate(512, 580) scale(5.2)" filter="drop-shadow(0 2px 8px rgba(0,0,0,0.15))">
    <path d="M0,-48 C0,-48, 0,-72, -24,-84 C-48,-96, -72,-72, -72,-48 C-72,-12, -36,24, 0,60 C36,24, 72,-12, 72,-48 C72,-72, 48,-96, 24,-84 C0,-72, 0,-48, 0,-48Z" fill="#F25022"/>
  </g>

  <!-- Heart 2: medium, Microsoft Yellow -->
  <g transform="translate(512, 580) scale(3.25)">
    <path d="M0,-48 C0,-48, 0,-72, -24,-84 C-48,-96, -72,-72, -72,-48 C-72,-12, -36,24, 0,60 C36,24, 72,-12, 72,-48 C72,-72, 48,-96, 24,-84 C0,-72, 0,-48, 0,-48Z" fill="#FFB900"/>
  </g>

  <!-- Heart 3: smallest, Microsoft Green -->
  <g transform="translate(512, 580) scale(1.7)">
    <path d="M0,-48 C0,-48, 0,-72, -24,-84 C-48,-96, -72,-72, -72,-48 C-72,-12, -36,24, 0,60 C36,24, 72,-12, 72,-48 C72,-72, 48,-96, 24,-84 C0,-72, 0,-48, 0,-48Z" fill="#7FBA00"/>
  </g>
</svg>
